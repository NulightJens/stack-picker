name = "stack-picker"
main = "src/server/index.ts"
compatibility_date = "2026-03-01"
workers_dev = true

[assets]
directory = "./dist/client"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "stack-picker-db"
database_id = "REPLACE_AFTER_WRANGLER_D1_CREATE"

[vars]
# Set to your deployed origin — used by the Worker's CORS allow-list.
SITE_URL = "https://stack.example.com"

# ---------- Optional: hardened security ----------
# Uncomment after running `wrangler secret put ADMIN_TOKEN` if you want
# to add an admin-only endpoint later.
# [secrets]
# ADMIN_TOKEN = "..."
